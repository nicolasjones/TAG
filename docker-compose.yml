services:
  api:
    container_name: auto-tag-api
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./workflows:/app/workflows
      - ./data:/app/data
    restart: always

  # Túnel estable con Ngrok
  tunnel:
    container_name: auto-tag-tunnel
    image: ngrok/ngrok:latest
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - api:8000
      - --domain=${NGROK_DOMAIN}
    depends_on:
      - api
